name: Fetch Timetable

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Go4Schools username"
        required: true
      password:
        description: "Go4Schools password"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox + Geckodriver
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox geckodriver

      - name: Install dependencies
        run: |
          pip install selenium

      - name: Run script
        env:
          USERNAME: ${{ inputs.username }}
          PASSWORD: ${{ inputs.password }}
        run: |
          python sel.py

      - name: Upload timetable artifact
        uses: actions/upload-artifact@v4
        with:
          name: timetable
          path: timetable.json

      - name: Commit timetable to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add timetable.json
          git commit -m "Update timetable" || echo "No changes"
          git push
