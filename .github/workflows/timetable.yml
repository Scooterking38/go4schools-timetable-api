name: Fetch Timetable

on:
  workflow_dispatch:  # manual run
  schedule:
    - cron: "0 6 * * 1-5" # 6:00 AM UTC Mon-Fri

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Selenium timetable scraper
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python sel.py

      - name: Upload timetable artifact
        uses: actions/upload-artifact@v4
        with:
          name: timetable
          path: timetable.json

      - name: Commit timetable to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add timetable.json
          git commit -m "Update timetable" || echo "No changes"
          git push
