name: Fetch Timetable

on:
  workflow_dispatch:  # manual run
  schedule:
    - cron: "0 6 * * *" # 6:00 AM UTC Mon-Fri

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Selenium timetable scraper
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: python sel.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: school-data
          path: |
            timetable.json
            homework.json

      - name: Commit JSON files to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add timetable.json homework.json
          git commit -m "Update timetable & homework" || echo "No changes"
          git push
